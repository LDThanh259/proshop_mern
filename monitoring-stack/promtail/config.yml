server:
  # Port HTTP nội bộ của Promtail
  http_listen_port: 9080

positions:
  # Lưu vị trí đã đọc log để tránh đọc lại từ đầu sau restart
  filename: /tmp/positions.yaml

clients:
  # Gửi log sang Loki
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    # Đọc Docker JSON logs của toàn bộ container
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
