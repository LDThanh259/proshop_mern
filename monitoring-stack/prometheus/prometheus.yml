global:
  # Tần suất scrape metric mặc định
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: node-exporter
    # Scrape metric của máy chủ EC2
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    # Scrape metric của container Docker
    static_configs:
      - targets: ["cadvisor:8080"]

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
