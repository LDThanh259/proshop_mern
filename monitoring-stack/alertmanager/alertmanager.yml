global:
  resolve_timeout: 5m

route:
  receiver: telegram-notifications
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h

receivers:
  - name: telegram-notifications
    telegram_configs:
      - bot_token: 8088342960:AAHOeJypG8O6UmQ10YvNpHw_hlswD6Sc7jQ
        chat_id: -5112324657
        message: |-
          {{ range .Alerts -}}
          {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname
      - instance
