services:
  nginx:
    # Nginx la lop reverse proxy nhan traffic tu ben ngoai.
    image: nginx:1.27
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - observability

  frontend:
    # Frontend duoc pull tu GitHub Container Registry.
    image: ghcr.io/ldthanh259/proshop_mern-frontend:latest
    container_name: frontend
    networks:
      - observability

  backend:
    # Backend duoc pull tu GitHub Container Registry.
    image: ghcr.io/ldthanh259/proshop_mern-backend:latest
    container_name: backend
    environment:
      - MONGO_URI=mongodb://mongodb:27017/proshop
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - observability

  seed:
    # Service chay mot lan de import du lieu mau vao MongoDB.
    image: ghcr.io/ldthanh259/proshop_mern-backend:latest
    container_name: seed
    profiles:
      - seed
    environment:
      - MONGO_URI=mongodb://mongodb:27017/proshop
      - NODE_ENV=production
    command: npm run data:import
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - observability

  mongodb:
    # Database luu du lieu don hang, nguoi dung va san pham.
    image: mongo:7
    container_name: mongodb
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - observability

volumes:
  # Named volume de du lieu MongoDB khong mat khi container bi xoa.
  mongo-data:

networks:
  # Network dung chung giua app stack va monitoring stack.
  observability:
    external: true
