services:
  nginx:
    # Nginx lam reverse proxy cho moi truong local.
    image: nginx:1.27
    container_name: nginx-local
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.http.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - observability

  frontend:
    # Build frontend tu source code local.
    build:
      context: ../proshop_mern
      dockerfile: frontend/Dockerfile.serve
    container_name: frontend-local
    networks:
      - observability

  backend:
    # Build backend tu source code local.
    build:
      context: ../proshop_mern
      dockerfile: backend/Dockerfile
    container_name: backend-local
    env_file:
      - .env
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/proshop}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-5000}
      JWT_SECRET: ${JWT_SECRET:-abc123}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - observability

  seed:
    # Service chay mot lan de import du lieu mau vao MongoDB.
    build:
      context: ../proshop_mern
      dockerfile: backend/Dockerfile
    container_name: seed-local
    profiles:
      - seed
    env_file:
      - .env
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/proshop}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-5000}
      JWT_SECRET: ${JWT_SECRET:-abc123}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
    command: npm run data:import
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - observability

  mongodb:
    # MongoDB chay local de test nhanh.
    image: mongo:7
    container_name: mongodb-local
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - observability

volumes:
  # Volume luu du lieu MongoDB local.
  mongo-data:

networks:
  # Network dung chung giua Nginx, frontend, backend va MongoDB.
  observability:
    external: true
